name: Update flake.lock

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

jobs:
  lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          pr-title: "chore: update flake.lock"
          pr-labels: dependencies
          pr-body: |
            Automated `nix flake update`.

            After merge:
            ```
            ~/bin/dotctl sync-nix-profile
            sudo nix run nix-darwin/master#darwin-rebuild -- switch --flake .#personal
            ```

      - name: Validate updated flake
        run: nix flake check --no-build
