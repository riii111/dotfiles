# enable mouse support
set -g mouse on

# ── Prefix: Ctrl+Q (unified with WezTerm leader) ──
unbind C-b
set -g prefix C-q
bind C-q send-prefix

# Notify WezTerm when a tmux client is attached/detached.
set-hook -g client-attached 'run-shell "printf '\''\033]1337;SetUserVar=TMUX_ACTIVE=%s\007'\'' \"$(printf 1 | base64)\" > #{client_tty}"'
set-hook -g client-detached 'run-shell "printf '\''\033]1337;SetUserVar=TMUX_ACTIVE=%s\007'\'' \"$(printf 0 | base64)\" > #{client_tty}"'

# ── Copy mode (vim-style) ──
setw -g mode-keys vi
bind v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Y send-keys -X select-line \; send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Scrollback pager: open in Neovim (prefix+V) ──
bind V run-shell "~/.config/tmux/open-scrollback.sh"

# System clipboard integration via OSC 52 (for SSH/nested tmux)
set -g set-clipboard on
set -g allow-passthrough on

# Pass through modified keys (Shift+Enter etc.) to inner apps
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

# ── Plugins ──
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'Nybkox/tmux-ukiyo'

# ── Theme (prefix+T for interactive menu) ──
set -g @ukiyo-theme 'catppuccin/mocha'
set -g @ukiyo-ignore-window-colors true

# ── Status bar plugins ──
set -g @ukiyo-plugins "battery cpu-usage ram-usage weather"
set -g @ukiyo-show-location false

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
