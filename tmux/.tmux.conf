# enable mouse support
set -g mouse on

# ── Prefix: Ctrl+A (unified with WezTerm leader) ──
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Copy mode (vim-style) ──
setw -g mode-keys vi
bind v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Y send-keys -X select-line \; send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Scrollback pager: open in Neovim (prefix+V) ──
bind V run-shell "tmux capture-pane -epS - > /tmp/tmux-scrollback && tmux new-window '/opt/homebrew/bin/nvim --clean -c \"luafile ~/.config/tmux/scrollback-pager.lua\" -c \"terminal cat /tmp/tmux-scrollback; rm /tmp/tmux-scrollback; tail -f /dev/null\"'"

# System clipboard integration via OSC 52 (for SSH/nested tmux)
set -g set-clipboard on

# Pass through modified keys (Shift+Enter etc.) to inner apps
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

# ── Plugins ──
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'Nybkox/tmux-ukiyo'

# ── Theme (prefix+T for interactive menu) ──
set -g @ukiyo-theme 'catppuccin/mocha'
set -g @ukiyo-ignore-window-colors true

# ── Status bar plugins ──
set -g @ukiyo-plugins "battery cpu-usage ram-usage weather"
set -g @ukiyo-show-location false

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
