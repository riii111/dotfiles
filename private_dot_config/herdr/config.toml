# キー割当の方針:
# - 対象が違っても、同じ種類の操作は同じキー体系に寄せる。
#   例) pane / tab / workspace / agent の移動、作成、終了、前後移動。
# - よく使う移動や表示切替、かつ、誤操作の影響が小さいものは1キーにする。
# - 作成と終了は対象リソース名の頭文字に揃え、終了はShift付きにする。
#   例) pane: p / Shift+p, tab: t / Shift+t, workspace: w / Shift+w。
# - lazygit など外部TUIの起動は、pane内アプリの通常操作と区別するためOption付きにする。
# - q のように外部TUIで頻出するキーは、Herdr側の終了・切断操作に使わない。
# - WezTerm / tmux と近い割当を保ち、どの操作レイヤーでも手癖がずれないようにする。

[update]
channel = "stable"

version_check = false
manifest_check = true  # 新CLI対応を拾う

[terminal]
default_shell = "zsh"

shell_mode = "auto"

new_cwd = "follow"  # 元pane/workspaceのcwdを引き継ぐ

[worktrees]
directory = "~/worktrees"

[remote]
manage_ssh_config = true  # --remote時に一時SSH config + keepalive fallback

[keys]
prefix = "ctrl+semicolon"

focus_pane_left  = ["prefix+h"]
focus_pane_down  = ["prefix+j"]
focus_pane_up    = ["prefix+k"]
focus_pane_right = ["prefix+l"]

previous_tab = ["prefix+["]
next_tab     = ["prefix+]"]

previous_workspace = "prefix+shift+["
next_workspace = "prefix+shift+]"

previous_agent = "prefix+,"
next_agent = "prefix+."

switch_workspace = "prefix+shift+1..9"

# agent/neovimと衝突したら直接shortcutを外してprefixのみに
new_workspace    = "prefix+w"
new_tab          = ["prefix+t"]
split_vertical   = ["prefix+p"]
split_horizontal = ["prefix+shift+d"]

copy_mode = "prefix+v"
edit_scrollback = "prefix+shift+v"
detach = "prefix+shift+o"
close_pane = "prefix+shift+p"
close_tab = "prefix+shift+t"
close_workspace = "prefix+shift+w"

zoom = ["prefix+z"]
resize_mode = "prefix+r"

workspace_picker = "prefix+space"  # 誤爆防止のためprefixのみ
rename_pane = ""      # close_pane の prefix+shift+p と既定値が衝突するため無効化
rename_tab = ""       # close_tab の prefix+shift+t と既定値が衝突するため無効化
rename_workspace = "" # close_workspace の prefix+shift+w と既定値が衝突するため無効化

remote_image_paste = ""  # remote attach時のraw Ctrl-v画像paste無効（neovim/shell優先）

[theme]
name = "rose-pine"
auto_switch = false

[ui]
sidebar_width = 28      # 少し狭めで十分
sidebar_min_width = 18
sidebar_max_width = 36

mobile_width_threshold = 64  # この幅未満でmobile layout

mouse_capture = false  # 初回はtrue推奨。WezTerm Cmd-click URL優先ならfalse

right_click_passthrough_modifier = "ctrl"  # Ctrl+右クリック→pane内app、右クリック単体→Herdr menu

redraw_on_focus_gained = true  # terminal復帰時の表示崩れ対策

mouse_scroll_lines = 3  # wheel 1ノッチあたりのscrollback行数

confirm_close = true        # workspace/pane誤close対策
# prompt_new_tab_name = false # 新規tab名は後でrename

pane_borders = true  # 境界は残す
pane_gaps = false    # 隙間は詰める

show_agent_labels_on_pane_borders = true  # claude/codex/cursor等のlabel。ノイズならfalse

agent_panel_sort = "priority"  # 要対応順。repo/workspace順なら "spaces"

accent = "cyan"  # theme=terminalでもaccentだけ指定可

[ui.toast]
delivery = "herdr"  # Herdr内toast。"terminal"でWezTerm通知
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-right"  # delivery="herdr" の時のみ

[ui.toast.clipboard]
enabled = true             # copy完了toast
position = "bottom-center"

[ui.sound]
enabled = false

[advanced]
scrollback_limit_bytes = 20971520  # agent/test log読むなら20MiB程度まで引き上げとく

[session]
resume_agents_on_restore = true  # server再起動後、session参照を持つagentをnative resume

[experimental]
pane_history = false     # restart後もpane内容保存。secret/token保存の恐れあり
allow_nested = false     # Herdr内Herdr起動。testing以外はfalse
kitty_graphics = false   # WezTerm通常運用ではoff

reveal_hidden_cursor_for_cjk_ime = true  # macOS+CJK: agent TUIがcursor隠すとIME候補位置がズレる対策
cjk_ime_agents = ["claude", "codex", "cursor", "pi"]
cjk_ime_cursor_shape = "steady_block"

switch_ascii_input_source_in_prefix = true  # macOS+CJK: prefix mode中だけASCII入力sourceへ

[[keys.command]]
key = "prefix+alt+g"
type = "pane"
command = "lazygit"
description = "run lazygit"

[[keys.command]]
key = "prefix+alt+s"
type = "pane"
command = "sabiql"
description = "run sabiql"
