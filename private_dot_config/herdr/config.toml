[update]
channel = "stable"

version_check = false
manifest_check = true  # agent manifest更新チェック（新CLI対応を拾う）

[terminal]
default_shell = "zsh"

shell_mode = "auto"

new_cwd = "follow"  # 元pane/workspaceのcwdを引き継ぐ（repo作業向け）

[worktrees]
directory = "~/worktrees"  # Git worktree作成先。repo内を汚さないなら外側（~/src/worktrees 等）

[remote]
manage_ssh_config = true  # --remote時に一時SSH config + keepalive fallback。自前管理ならfalse

[keys]
prefix = "ctrl+k"

focus_pane_left  = ["prefix+h", "ctrl+alt+h"]
focus_pane_down  = ["prefix+j", "ctrl+alt+j"]
focus_pane_up    = ["prefix+k", "ctrl+alt+k"]
focus_pane_right = ["prefix+l", "ctrl+alt+l"]

previous_tab = ["prefix+p"]  # prefixまたは直接
next_tab     = ["prefix+n"]

previous_agent = "prefix+,"
next_agent = "prefix+."

switch_workspace = "prefix+shift+1..9"

# agent/neovimと衝突したら直接shortcutを外してprefixのみに
new_tab          = ["prefix+c", "ctrl+alt+c"]
split_vertical   = ["prefix+v", "ctrl+alt+d"]           # 右split
split_horizontal = ["prefix+minus", "ctrl+alt+shift+d"] # 下split

zoom = ["prefix+z"]  # pane拡大

workspace_picker = "prefix+w"  # 誤爆防止のためprefixのみ

remote_image_paste = ""  # remote attach時のraw Ctrl-v画像paste無効（neovim/shell優先）

# [theme]
# name = "catpuccin"

[ui]
sidebar_width = 28      # 混在agent表示。少し狭めで十分
sidebar_min_width = 18
sidebar_max_width = 36

mobile_width_threshold = 64  # この幅未満でmobile layout

mouse_capture = true  # 初回はtrue推奨。WezTerm Cmd-click URL優先ならfalse

right_click_passthrough_modifier = "ctrl"  # Ctrl+右クリック→pane内app、右クリック単体→Herdr menu

redraw_on_focus_gained = true  # terminal復帰時の表示崩れ対策

mouse_scroll_lines = 3  # wheel 1ノッチあたりのscrollback行数

confirm_close = true        # workspace/pane誤close対策
prompt_new_tab_name = false # 新規tab名は後でrename

pane_borders = true  # 境界は残す
pane_gaps = false    # 隙間は詰める

show_agent_labels_on_pane_borders = true  # claude/codex/cursor等のlabel。ノイズならfalse

agent_panel_sort = "priority"  # 要対応順。repo/workspace順なら "spaces"

accent = "cyan"  # theme=terminalでもaccentだけ指定可

[ui.toast]
delivery = "herdr"  # Herdr内toast。"terminal"でWezTerm通知
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-right"  # delivery="herdr" の時のみ

[ui.toast.clipboard]
enabled = true             # copy完了toast。邪魔ならfalse
position = "bottom-center"

[ui.sound]
enabled = false

[advanced]
scrollback_limit_bytes = 20971520  # default 10MiB。agent/test log読むなら20MiB程度

[session]
resume_agents_on_restore = true  # server再起動後、session参照を持つagentをnative resume

[experimental]
pane_history = false     # restart後もpane内容保存。secret/token保存の恐れあり
allow_nested = false     # Herdr内Herdr起動。testing以外はfalse
kitty_graphics = false   # WezTerm通常運用ではoff

reveal_hidden_cursor_for_cjk_ime = true  # macOS+CJK: agent TUIがcursor隠すとIME候補位置がズレる対策
cjk_ime_agents = ["claude", "codex", "cursor", "pi"]
cjk_ime_cursor_shape = "steady_block"

switch_ascii_input_source_in_prefix = true  # macOS+CJK: prefix mode中だけASCII入力sourceへ

[[keys.command]]
key = "prefix+g"
type = "pane"
command = "lazygit"
description = "run lazygit"
